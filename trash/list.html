{{ define "main" }}

<article class="content">
  <h1>{{ .Title }}</h1>

  <div class="tree">
    {{ if .Sections }}

      {{ range .Sections }}
        <div class="node section">
          <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        </div>
      {{ end }}

    {{ else }}

      {{ range .Pages }}
        <div class="node page">
          <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        </div>
      {{ end }}

    {{ end }}
  </div>
</article>

{{ end }}
